<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + JS</title>
  </head>
  <body>
    <main>
      <h1 class="text-2xl font-bold color-error">Urodzny?</h1>
      <section>
        <form id="formId">
          <input type="date" id="dataUrodzenia" name="dataUrodzenia"/>
          <label for="dataUrodzenia">Data urodzenia</label>

          <button type="submit" class="bg-blue-300 p-4">Potwierdź</button>
        </form>
        <div><p id="returnBox">Proszę podaj swoją datę urodzenia</p></div>
      </section>
      <div id="app"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
    <table>
      <thead>
        <tr class="p-4">
          <th scope="col" class="p-4">
            ID
          </th>
          <th scope="col" class="p-4">
            author
          </th>
          <th scope="col" class="p-4">
            content
          </th>
          <th scope="col" class="p-4">
            created_at
          </th>
          <th scope="col"  class="p-4">
            subtitle
          </th>
          <th scope="col" class="p-4">
            title
          </th>
        </tr>
      </thead>
      <tbody id="table_body">

      </tbody>

    </table>
    <form id="new_article">
      <label for="author">author</label> <input type="text" id="author" name="author" class="bg-blue-300" required>
      <label for="content">content</label> <textarea name="content" id="content" cols="30" rows="10" class="bg-blue-300" required></textarea>
      <label for="title">title</label> <input type="text" id="title" class="bg-blue-300" required>
      <label for="subtitle">subtitle</label> <input type="text" id="subtitle" class="bg-blue-300" required>
      <button type="submit">Potwierdź</button>
    </form>
  </body>
</html>
